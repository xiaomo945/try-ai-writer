<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Try AI Writer — Offline</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #0a0a0c 0%, #111113 50%, #0a0a0c 100%);
      color: #e2e8f0;
      overflow: hidden;
    }

    .container {
      text-align: center;
      padding: 2rem;
      max-width: 480px;
    }

    .icon-wrapper {
      position: relative;
      width: 120px;
      height: 120px;
      margin: 0 auto 2rem;
    }

    .icon-ring {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      border: 2px solid transparent;
      background: linear-gradient(135deg, #059669, #14b8a6) border-box;
      -webkit-mask: linear-gradient(#fff 0 0) padding-box, linear-gradient(#fff 0 0);
      mask: linear-gradient(#fff 0 0) padding-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      animation: pulse-ring 2s ease-in-out infinite;
    }

    .icon-inner {
      position: absolute;
      inset: 16px;
      border-radius: 50%;
      background: rgba(5, 150, 105, 0.08);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .icon-svg {
      width: 48px;
      height: 48px;
      stroke: #059669;
      fill: none;
      stroke-width: 1.5;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .glow {
      position: absolute;
      inset: -20px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(20, 184, 166, 0.12) 0%, transparent 70%);
      animation: glow-pulse 3s ease-in-out infinite;
    }

    h1 {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: 2rem;
      font-weight: 800;
      margin-bottom: 0.75rem;
      background: linear-gradient(135deg, #059669, #14b8a6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    p {
      font-size: 1rem;
      line-height: 1.6;
      color: #94a3b8;
      margin-bottom: 1.5rem;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      padding: 0.875rem 2rem;
      border-radius: 0.75rem;
      font-size: 0.9375rem;
      font-weight: 600;
      text-decoration: none;
      cursor: pointer;
      transition: all 0.3s ease-out;
      min-height: 48px;
      min-width: 48px;
      border: none;
    }

    .btn-primary {
      background: linear-gradient(135deg, #059669, #14b8a6);
      color: #fff;
      box-shadow: 0 4px 20px rgba(5, 150, 105, 0.3);
    }

    .btn-primary:hover {
      box-shadow: 0 8px 36px rgba(20, 184, 166, 0.45);
      transform: translateY(-2px);
    }

    .btn-primary:active {
      transform: scale(0.96);
    }

    .btn-icon {
      width: 18px;
      height: 18px;
      stroke: currentColor;
      fill: none;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .status-bar {
      margin-top: 2rem;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      font-size: 0.8125rem;
      color: #64748b;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #ef4444;
      animation: blink 1.5s ease-in-out infinite;
    }

    @keyframes pulse-ring {
      0%, 100% { opacity: 0.6; transform: scale(1); }
      50% { opacity: 1; transform: scale(1.05); }
    }

    @keyframes glow-pulse {
      0%, 100% { opacity: 0.5; }
      50% { opacity: 1; }
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    @media (prefers-color-scheme: light) {
      body {
        background: linear-gradient(135deg, #f8fafc 0%, #f1f5f9 50%, #f8fafc 100%);
        color: #1e293b;
      }
      p { color: #64748b; }
      .icon-inner { background: rgba(5, 150, 105, 0.06); }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon-wrapper">
      <div class="glow"></div>
      <div class="icon-ring"></div>
      <div class="icon-inner">
        <svg class="icon-svg" viewBox="0 0 24 24">
          <line x1="1" y1="1" x2="23" y2="23" />
          <path d="M16.72 11.06A10.94 10.94 0 0 1 19 12.55" />
          <path d="M5 12.55a10.94 10.94 0 0 1 5.17-2.39" />
          <path d="M10.71 5.05A16 16 0 0 1 22.56 9" />
          <path d="M1.42 9a15.91 15.91 0 0 1 4.7-2.88" />
          <path d="M8.53 16.11a6 6 0 0 1 6.95 0" />
          <line x1="12" y1="20" x2="12.01" y2="20" />
        </svg>
      </div>
    </div>

    <h1>You're Offline</h1>
    <p>It seems you've lost your internet connection. Don't worry — your recent work is safe. Reconnect to continue writing with AI.</p>

    <button class="btn btn-primary" onclick="window.location.reload()">
      <svg class="btn-icon" viewBox="0 0 24 24">
        <polyline points="23 4 23 10 17 10" />
        <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10" />
      </svg>
      Try Again
    </button>

    <div class="status-bar">
      <span class="status-dot"></span>
      <span>Waiting for connection...</span>
    </div>
  </div>

  <script>
    // Auto-retry when connection is restored
    window.addEventListener('online', function () {
      window.location.reload();
    });

    // Periodic check
    setInterval(function () {
      if (navigator.onLine) {
        window.location.reload();
      }
    }, 5000);
  </script>
</body>
</html>
