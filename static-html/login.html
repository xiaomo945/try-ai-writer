<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Use AI Writer</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@700;800&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #080c14; color: #e2e8f0; min-height: 100vh; display: flex; flex-direction: column; }
        h1, h2, h3 { font-family: 'Playfair Display', serif; font-weight: 800; }
        .nav { position: fixed; top: 0; left: 0; right: 0; z-index: 50; background: rgba(8, 12, 20, 0.8); backdrop-filter: blur(24px); border-bottom: 1px solid rgba(255,255,255,0.05); }
        .nav-container { max-width: 1280px; margin: 0 auto; padding: 0 24px; height: 64px; display: flex; align-items: center; justify-content: space-between; }
        .nav-links { display: flex; gap: 32px; align-items: center; }
        .nav-links a { color: #94a3b8; text-decoration: none; transition: color 0.3s; }
        .nav-links a:hover { color: white; }
        .btn-primary { display: inline-flex; align-items: center; justify-content: center; padding: 16px 32px; border-radius: 16px; font-weight: 600; color: white; text-decoration: none; background: linear-gradient(135deg, #5b9cf5, #9b6dff); box-shadow: 0 4px 24px rgba(91, 156, 245, 0.3); transition: all 0.3s; min-height: 48px; border: none; cursor: pointer; }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 40px rgba(155, 109, 255, 0.45); }
        .glass-card { position: relative; border-radius: 16px; border: 1px solid rgba(255,255,255,0.08); padding: 40px; background: rgba(255,255,255,0.03); backdrop-filter: blur(24px); width: 100%; max-width: 440px; }
        .container { flex: 1; display: flex; align-items: center; justify-content: center; padding: 120px 24px 40px; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; font-weight: 500; color: #cbd5e1; }
        .form-group input { width: 100%; padding: 14px 16px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1); background: rgba(255,255,255,0.02); color: white; font-size: 16px; outline: none; transition: border 0.3s; }
        .form-group input:focus { border-color: rgba(91, 156, 245, 0.5); }
        .glass-card h1 { font-size: 28px; margin-bottom: 8px; }
        .glass-card p.subtitle { color: #94a3b8; margin-bottom: 32px; }
        .divider { display: flex; align-items: center; margin: 24px 0; color: #64748b; }
        .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: rgba(255,255,255,0.1); }
        .divider span { padding: 0 12px; }
        .oauth-btn { width: 100%; display: flex; align-items: center; justify-content: center; gap: 12px; padding: 14px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.2); background: rgba(255,255,255,0.02); color: #e2e8f0; text-decoration: none; font-weight: 500; transition: all 0.3s; }
        .oauth-btn:hover { border-color: rgba(255,255,255,0.4); background: rgba(255,255,255,0.06); }
        footer { border-top: 1px solid rgba(255,255,255,0.05); padding: 40px 24px; }
        .footer-container { max-width: 1280px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; }
        .footer-links { display: flex; gap: 24px; }
        .footer-links a { color: #94a3b8; text-decoration: none; transition: color 0.3s; }
        .footer-links a:hover { color: white; }
        @media (max-width: 768px) {
            .nav-links { display: none; }
        }
    </style>
</head>
<body>
    <nav class="nav">
        <div class="nav-container">
            <a href="index.html" style="display: flex; align-items: center; gap: 8px; text-decoration: none; color: white;">
                <div style="width: 32px; height: 32px; background: linear-gradient(135deg, #5b9cf5, #9b6dff); border-radius: 8px;"></div>
                <span style="font-family: 'Playfair Display', serif; font-weight: 800; font-size: 18px;">Use AI<span style="color: #5b9cf5;">Writer</span></span>
            </a>
            <div class="nav-links">
                <a href="write.html">Write</a>
                <a href="pricing.html">Pricing</a>
                <a href="index.html">Home</a>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="glass-card">
            <h1>Welcome back</h1>
            <p class="subtitle">Sign in to continue writing with AI</p>
            <a href="#" class="oauth-btn">
                <span style="font-size: 20px;">🔵</span>
                Continue with Google
            </a>
            <div class="divider"><span>or</span></div>
            <form>
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" placeholder="you@example.com">
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="••••••••">
                </div>
                <button type="submit" class="btn-primary" style="width: 100%; margin-top: 8px;">Sign in</button>
            </form>
        </div>
    </div>

    <footer>
        <div class="footer-container">
            <div style="display: flex; align-items: center; gap: 8px;">
                <div style="width: 24px; height: 24px; background: linear-gradient(135deg, #5b9cf5, #9b6dff); border-radius: 4px;"></div>
                <span style="color: #64748b; font-size: 14px;">© 2026 Use AI Writer. All rights reserved.</span>
            </div>
            <div class="footer-links">
                <a href="pricing.html">Pricing</a>
                <a href="index.html">Home</a>
            </div>
        </div>
    </footer>
</body>
</html>
